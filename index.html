<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>CosmicLens</h1>
     <label>Search images with keywords:</label>
    <input type="text" id="search" placeholder="Eg:space" />
    <button id="randomBtn">🎲 Random 10</button>
    
    <select id="filter">
        <option value="all">All</option>
        <option value="image">Images</option>
        <option value="video">Videos</option>
    </select>
    
    <button id="themeToggle">🌙 Dark Mode</button>
    
    <div id="container"></div>
    <div class="date-wrapper">
        <label>Search:</label>

        <input type="date" id="datePicker">
    </div>
    
    <h2 id="title"></h2>
    <img id="img" width="800">
    <p id="desc"></p>

    <label>
        <input type="checkbox" id="hdToggle"> HD Image
    </label>
    <button onclick="goFull()">Fullscreen</button>

    
    </div>
    
    <script src="script.js"></script>
</body>
</html>
